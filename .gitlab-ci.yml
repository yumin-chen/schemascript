image: oven/bun:latest

stages:
  - test
  - build
  - publish
  - integration_test

variables:
  BUN_INSTALL_DIR: /usr/local/bin

before_script:
  - apt-get update && apt-get install -y git
  - bun install --frozen-lockfile

test:
  stage: test
  script:
    - bun test --coverage --coverage-reporter=text --coverage-reporter=lcov --reporter=junit --reporter-outfile=junit.xml
  coverage: '/All files\s*\|\s*(\d+(?:\.\d+)?)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: junit.xml

build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - dist/
      - out/

publish:dry-run:
  stage: publish
  script:
    - bun run publish --dry-run
  rules:
    - if: '$CI_COMMIT_TAG == null'

publish:alpha:
  stage: publish
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set, skipping publish"
        exit 1
      fi
      bun run publish --tag alpha
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

publish:latest:
  stage: publish
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set, skipping publish"
        exit 1
      fi
      bun run publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: always

test:registry:
  stage: integration_test
  needs:
    - job: publish:alpha
  script:
    - mkdir registry_test
    - cp -r src registry_test/
    - cd registry_test
    - bun init -y
    - bun add @artefacto/schemascript@alpha
    - # Use the installed package instead of the local source for tests
    - find src -name "*.test.ts" -exec sed -i 's|@/|@artefacto/schemascript|g' {} +
    - find src -name "*.test.ts" -exec sed -i 's|"\.\./\.\./\.\./index"|"@artefacto/schemascript"|g' {} +
    - find src -name "*.test.ts" -exec sed -i 's|"\.\./\.\./index"|"@artefacto/schemascript"|g' {} +
    - find src -name "*.test.ts" -exec sed -i 's|"\.\./index"|"@artefacto/schemascript"|g' {} +
    - bun test src/artefact/schemascript/core/table.e2e.test.ts
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
