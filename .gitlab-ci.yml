image: oven/bun:latest

stages:
  - test
  - build
  - publish

variables:
  BUN_INSTALL_DIR: /usr/local/bin

before_script:
  - apt-get update && apt-get install -y git
  - bun install --frozen-lockfile

test:
  stage: test
  script:
    - bun test --coverage --coverage-reporter=text --coverage-reporter=lcov --reporter=junit --reporter-outfile=junit.xml
  coverage: '/All files\s*\|\s*(\d+(?:\.\d+)?)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: junit.xml

build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - dist/
      - out/

publish:dry-run:
  stage: build
  script:
    - bun run publish --dry-run
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

publish:
  stage: publish
  script:
    - bun run publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - package.json
      when: manual
      allow_failure: true

publish:alpha:
  stage: publish
  script:
    - bun run publish --tag alpha
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

verify:alpha:
  stage: publish
  needs: ["publish:alpha"]
  script:
    - mkdir verify-alpha && cd verify-alpha
    - bun init -y
    - bun add @artefacto/schemascript@alpha
    - SCHEMASCRIPT_LIB_IMPORT="@artefacto/schemascript" bun test ../src/artefact/schemascript/core/*.e2e.test.ts
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
