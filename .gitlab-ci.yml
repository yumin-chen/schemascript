image: oven/bun:latest

stages:
  - test
  - build
  - publish-dry-run
  - publish
  - verify

variables:
  BUN_INSTALL_DIR: /usr/local/bin

before_script:
  - apt-get update && apt-get install -y git
  - bun install --frozen-lockfile

test:
  stage: test
  script:
    - bun test --coverage --coverage-reporter=text --coverage-reporter=lcov --reporter=junit --reporter-outfile=junit.xml
  coverage: '/All files\s*\|\s*(\d+(?:\.\d+)?)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: junit.xml

build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - dist/
      - out/

publish:dry-run:
  stage: publish-dry-run
  script:
    - bun publish --dry-run
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

publish:latest:
  stage: publish
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set, skipping publish"
        exit 1
      fi
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      bun publish --access public
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: always

publish:alpha:
  stage: publish
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set, skipping publish"
        exit 1
      fi
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      bun publish --access public --tag alpha
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

verify:alpha:
  stage: verify
  script:
    - bun run scripts/verify-pkg.ts @artefacto/schemascript@alpha
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
      needs: ["publish:alpha"]
      allow_failure: true
