image: oven/bun:latest

stages:
  - test
  - build
  - publish
  - verify

variables:
  BUN_INSTALL_DIR: /usr/local/bin

before_script:
  - apt-get update && apt-get install -y git
  - bun install --frozen-lockfile

test:
  stage: test
  script:
    - bun test --coverage --coverage-reporter=text --coverage-reporter=lcov --reporter=junit --reporter-outfile=junit.xml
  coverage: '/All files\s*\|\s*(\d+(?:\.\d+)?)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: junit.xml

build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - dist/
      - out/

publish:
  stage: publish
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set, skipping publish"
        exit 1
      fi
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      bun publish --access public
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: always

publish:dry-run:
  stage: publish
  script:
    - bun publish --dry-run
  rules:
    - if: '$CI_COMMIT_TAG !~ /^v\d+\.\d+\.\d+/'

publish:alpha:
  stage: publish
  script:
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set, skipping publish"
        exit 1
      fi
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      bun publish --tag alpha --access public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

test:e2e:published:
  stage: verify
  needs:
    - job: publish:alpha
  script:
    - mkdir e2e-test
    - cd e2e-test
    - bun init -y
    - bun add @artefacto/schemascript@alpha
    - SCHEMASCRIPT_LIB_PATH=@artefacto/schemascript bun test ../src/artefact/schemascript/core/smoke.e2e.test.ts
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
