stages:
  - test
  - build
  - publish

image: oven/bun:latest

# Use a default before_script to keep things DRY
default:
  before_script:
    - bun install --frozen-lockfile

# Cache node_modules to speed up builds
cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/

test:
  stage: test
  script:
    - bun test --coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week

build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - dist/
      - src/artefact/schemascript/dist/
      - drizzle/
    expire_in: 1 week

publish_schemascript:
  stage: publish
  script:
    - cd src/artefact/schemascript
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - bun publish --access public
  only:
    - tags
  dependencies:
    - build

publish_main:
  stage: publish
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - bun publish --access public
  only:
    - tags
  dependencies:
    - build
