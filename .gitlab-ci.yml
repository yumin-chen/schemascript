stages:
  - test
  - build
  - publish

image: oven/bun:latest

default:
  before_script:
    - apt-get update -qy && apt-get install -y git
    - bun install --frozen-lockfile

cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/

test:
  stage: test
  script:
    - bun test --coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week

build_schemascript:
  stage: build
  script:
    - bun run build:schemascript
  artifacts:
    paths:
      - packages/artefact/schemascript/index.js
      - packages/artefact/schemascript/index.d.ts
      - packages/artefact/schemascript/core/
    expire_in: 1 week

build_core:
  stage: build
  script:
    - bun run build:core
  artifacts:
    paths:
      - packages/artefact/core/dist/
      - packages/artefact/core/drizzle/
    expire_in: 1 week

publish_schemascript:
  stage: publish
  script:
    - cd packages/artefact/schemascript
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - bun publish --access public
  only:
    - tags
  dependencies:
    - build_schemascript

publish_main:
  stage: publish
  script:
    - cd packages/artefact/core
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - bun publish --access public
  only:
    - tags
  dependencies:
    - build_core
